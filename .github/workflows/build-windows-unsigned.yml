name: Build unsigned Windows installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows x64 NSIS installer
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dashcam-gui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: unsigned-windows-x64

      - name: Install frontend dependencies
        run: npm ci --prefix apps/dashcam-gui

      - name: Stage checksum-verified Windows media tools
        run: npm run prepare:media --prefix apps/dashcam-gui

      - name: Build unsigned Windows installer
        run: >-
          npm run tauri --prefix apps/dashcam-gui -- build
          --target x86_64-pc-windows-msvc
          --bundles nsis

      - name: Verify installer exists and is unsigned
        shell: pwsh
        run: |
          $installer = Get-ChildItem "target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne "NotSigned") {
            throw "Expected an unsigned installer, found signature status $($signature.Status)"
          }
          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Generated unsigned installer: $($installer.Name)"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Kia-Dashcam-Processor-Windows-x64-unsigned
          path: ${{ env.INSTALLER_PATH }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
