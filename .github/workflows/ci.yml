name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, test, and frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dashcam-gui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci --prefix apps/dashcam-gui

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run strict Rust lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build frontend
        run: npm run build --prefix apps/dashcam-gui

  portable-engine:
    name: Engine and CLI on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test shared engine and CLI
        run: cargo test -p kia-dashcam-core -p kia-dashcam-cli
      - name: Smoke-test CLI contract
        run: cargo run -p kia-dashcam-cli -- --help
